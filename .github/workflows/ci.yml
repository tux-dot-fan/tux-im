name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # 1. Lint + static type check + unit tests
  # ---------------------------------------------------------------------
  test:
    name: Lint, type-check, and unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        # python3-gi / ibus headers are required to import tux_im (gi.repository)
        # at test time.  librime-data-* provides the wubi/pinyin dictionaries
        # that the lexicon tests load against.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ibus \
            ibus-data \
            librime-data-wubi \
            librime-data-luna-pinyin \
            librime-data-terra-pinyin \
            python3-gi \
            python3-ibus-1.0 \
            python3-tomli-w \
            python3-pytest \
            python3-pytest-asyncio \
            python3-respx

      - name: Install lint/type-check tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "mypy>=1.7" \
            "ruff>=0.1"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict)
        run: mypy --strict tux_im

      - name: Pytest
        # gi.repository must be importable; the system python3 already
        # has it, so we use that binary instead of the venv one.
        run: |
          /usr/bin/python3 -m pytest tests/ \
            --tb=short \
            -v

  # ---------------------------------------------------------------------
  # 2. Build .deb package
  # ---------------------------------------------------------------------
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so debian/changelog timestamps and dpkg
          # can read the version correctly.
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper \
            devscripts \
            dh-sequence-python3 \
            pybuild-plugin-pyproject \
            python3-all \
            python3-gi \
            python3-ibus-1.0 \
            python3-tomli-w \
            python3-pytest \
            python3-pytest-asyncio \
            python3-respx \
            librime-data-wubi \
            librime-data-luna-pinyin \
            librime-data-terra-pinyin

      - name: Build .deb
        working-directory: ${{ github.workspace }}
        run: |
          dpkg-buildpackage -us -uc -b
          # dpkg-buildpackage writes the .deb one level up from the
          # source tree (so it ends up in $GITHUB_WORKSPACE root).
          ls -la ../*.deb

      - name: Verify .deb metadata (sanity check)
        # We deliberately do NOT install the package: the runner does not
        # ship ibus-daemon / a graphical session, and our Depends list
        # pulls in rime data packages that are not strictly required to
        # validate the .deb file itself.  `dpkg-deb` is sufficient to
        # verify the package was built correctly.
        run: |
          DEB=$(ls ../*.deb | head -n1)
          echo "Inspecting $DEB"
          dpkg-deb -I "$DEB"
          echo "--- File list ---"
          dpkg-deb -c "$DEB" | head -40
          echo "--- Field summary ---"
          dpkg-deb -f "$DEB" Package Version Architecture Depends Recommends | head -30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tux-im-${{ github.ref_name }}-${{ github.sha }}
          path: ../*.deb
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------
  # 3. Attach .deb to a GitHub Release when a v* tag is pushed
  # ---------------------------------------------------------------------
  release:
    name: Attach .deb to GitHub Release
    runs-on: ubuntu-latest
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create/update releases
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tux-im-${{ github.ref_name }}-${{ github.sha }}
          path: dist/

      - name: Create / update GitHub Release and attach .deb
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.deb