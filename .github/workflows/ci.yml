name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------
  # 1. Lint + static type check + unit tests
  # ---------------------------------------------------------------------
  test:
    name: Lint, type-check, and unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        # python3-gi / ibus headers are required to import tux_im (gi.repository)
        # at test time.  librime-data-* provides the wubi/pinyin dictionaries
        # that the lexicon tests load against.  libgooglepinyin0-dev provides
        # /usr/lib/x86_64-linux-gnu/libgooglepinyin.so, which GooglePinyinMode
        # loads at import time; without it every wbpy test crashes with
        # FileNotFoundError before any assertion runs.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ibus \
            ibus-data \
            libgooglepinyin0-dev \
            librime-data-wubi \
            librime-data-luna-pinyin \
            librime-data-terra-pinyin \
            python3-gi \
            python3-ibus-1.0 \
            python3-tomli-w \
            python3-pytest \
            python3-pytest-asyncio

      - name: Install lint/type-check tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "mypy>=1.7" \
            "ruff>=0.1" \
            "respx>=0.21"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (strict)
        run: mypy --strict tux_im

      - name: Pytest
        # gi.repository must be importable; the system python3 already
        # has it, so we use that binary instead of the venv one.
        run: |
          /usr/bin/python3 -m pytest tests/ \
            --tb=short \
            -v

  # ---------------------------------------------------------------------
  # 1b. Auto-fix lint debt (separate job so the test job's pass/fail is
  #     independent of whether the project is currently ruff-clean).
  #     On push to main only: run `ruff check --fix --unsafe-fixes`,
  #     commit any resulting changes, and push them back.  This keeps
  #     main ruff-clean without requiring every contributor to fix all
  #     150+ unused-import / unused-noqa / import-sort issues by hand.
  # ---------------------------------------------------------------------
  lint-fix:
    name: Auto-fix lint debt
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Serialise fix jobs so two simultaneous pushes don't race on
    # `git push` to main.  The cancel-in-progress pattern is fine
    # because the commit is idempotent.
    concurrency:
      group: lint-fix-main
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ruff>=0.1"

      - name: Auto-fix lint debt
        # --fix            : apply safe fixes (unused imports, import sort,
        #                    unused noqa, etc.)
        # --unsafe-fixes   : also apply the small set of unsafe fixes ruff
        #                    refuses by default (e.g. UP037 quoted annotations);
        #                    the resulting code is still correct, just a less
        #                    safe rewrite.  Acceptable here.
        # --exit-zero      : always return 0 even when fixes were applied,
        #                    so the workflow can run `git diff` afterwards.
        run: |
          ruff check . --fix --unsafe-fixes --exit-zero || true

      - name: Show what changed
        run: git diff --stat || true

      - name: Commit and push fixes
        run: |
          if git diff --quiet; then
            echo "No lint changes to commit."
            exit 0
          fi
          git config user.name "tux-im-bot"
          git config user.email "tux-im-bot@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix ruff lint debt" \
                     -m "Applied by the lint-fix CI job: ruff check . --fix --unsafe-fixes --exit-zero" \
                     -m "No code changes were made by hand.  Keeps main ruff-clean without each contributor having to clean up pre-existing unused-import / import-sort debt."
          # Re-fetch in case another CI run pushed a fix commit in the
          # meantime (idempotency: rebasing our fix on top of theirs).
          git pull --rebase --autostash || true
          git push

  # ---------------------------------------------------------------------
  # 2. Build .deb package
  # ---------------------------------------------------------------------
  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so debian/changelog timestamps and dpkg
          # can read the version correctly.
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            devscripts \
            dh-sequence-python3 \
            pybuild-plugin-pyproject \
            python3-all \
            python3-gi \
            python3-httpx \
            python3-ibus-1.0 \
            python3-tomli-w \
            librime-data-wubi \
            librime-data-luna-pinyin \
            librime-data-terra-pinyin

      - name: Build .deb
        working-directory: ${{ github.workspace }}
        run: |
          dpkg-buildpackage -us -uc -b
          # dpkg-buildpackage writes the .deb one level up from the
          # source tree (so it ends up in $GITHUB_WORKSPACE root).
          ls -la ../*.deb

      - name: Verify .deb metadata (sanity check)
        # We deliberately do NOT install the package: the runner does not
        # ship ibus-daemon / a graphical session, and our Depends list
        # pulls in rime data packages that are not strictly required to
        # validate the .deb file itself.  `dpkg-deb` is sufficient to
        # verify the package was built correctly.
        run: |
          DEB=$(ls ../*.deb | head -n1)
          echo "Inspecting $DEB"
          dpkg-deb -I "$DEB"
          echo "--- File list ---"
          dpkg-deb -c "$DEB" | head -40
          echo "--- Field summary ---"
          dpkg-deb -f "$DEB" Package Version Architecture Depends Recommends | head -30

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tux-im-${{ github.ref_name }}-${{ github.sha }}
          path: ../*.deb
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------
  # 3. Attach .deb to a GitHub Release when a v* tag is pushed
  # ---------------------------------------------------------------------
  release:
    name: Attach .deb to GitHub Release
    runs-on: ubuntu-latest
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create/update releases
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tux-im-${{ github.ref_name }}-${{ github.sha }}
          path: dist/

      - name: Create / update GitHub Release and attach .deb
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.deb